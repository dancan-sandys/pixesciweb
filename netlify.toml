[build]
  # Build command for the frontend only (skip backend build)
  command = "npm run build:frontend"
  # Publish the frontend static files
  publish = "dist/public"

# Redirect all routes to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables hint
[context.production.environment]
  NODE_ENV = "production"